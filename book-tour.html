<h1>BOOK YOUR TOUR TODAY!</h1>
     
     <form class="button"
      action="https://formspree.io/f/xzzzzzzz"
      method="POST">

<label style="color:black;">Full Name*</label>
<input type="text"
       name="fullname"
       placeholder="Enter your name"
       required>

<label style="color:black;">Address*</label>
<input type="text"
       name="address"
       placeholder="Enter your address"
       required>

<label style="color:black;">Contact Number*</label>
<input type="tel"
       name="phone"
       placeholder="Enter your phone number"
       required>

<label style="color:black;">Desired Tour Date*</label>
<input type="date"
       name="tourdate"
       required>

<label style="color:black;">Time*</label>
<input type="time"
       name="tourtime"
       required>

<label style="color:black;">Number of Bedrooms*</label>
<input type="number"
       name="bedrooms"
       placeholder="Enter number"
       required>

<label style="color:black;">Comments*</label>
<textarea name="comments"
          placeholder="Share comments here..."
          required></textarea>

<button type="submit">
Book Tour
</button>
