<h1>BOOK YOUR TOUR TODAY!</h1>
     
       <form name="book-tour" method="POST" data-netlify="true">

    <input type="hidden" name="form-name" value="book-tour">

    <label style="color:black;">Full Name*</label>
    <textarea name="fullname" placeholder="Enter your name"></textarea>
    
  <input type="text" name="fullname" placeholder="Enter your name" required>

    <label style="color:black;">Address*</label>
    <textarea name="address" placeholder="Enter your address"></textarea>
         
<input type="text" name="address" placeholder="Enter your address" required>
         
    <label style="color:black;">Contact Number*</label>
    <textarea name="phone" placeholder="Enter your phone number"></textarea>

    <label style="color:black;">Desired Tour Date*</label>
    <textarea name="tourdate" placeholder="dd/mm/yy"></textarea>

    <label style="color:black;">Time*</label>
    <textarea name="tourtime" placeholder="Enter tour time"></textarea>

    <label style="color:black;">Number of bedrooms*</label>
    <textarea name="bedrooms" placeholder="Enter number"></textarea>

    <label style="color:black;">Comments*</label>
    <textarea name="comments" placeholder="Share comments here..."></textarea>

    <button type="submit">Book Tour</button>
