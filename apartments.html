<div id="lightbox" class="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <span class="prev" onclick="changeImage(-1)">❮</span>

    <img id="lightboxImage">
    <p id="caption"></p>

    <span class="next" onclick="changeImage(1)">❯</span>

    <button class="back-btn" onclick="closeLightbox()">
        Back to Apartment Page
    </button>
</div>

    <script>
let images = [
    { src: "images/kitchen1.jpg", title: "Kitchen" },
    { src: "images/2bed.jpg", title: "Bedroom" },
    { src: "images/kitchen2.jpg", title: "Modern Kitchen" },
    { src: "images/bath1.jpg", title: "Bathroom" },
    { src: "images/sittingroom3.jpg", title: "Living Room" },
    { src: "images/bluebeds.jpg", title: "Master Bedroom" },
    { src: "images/GREYBATH.jpg", title: "Bathroom" },
    { src: "images/sittingroom2.jpg", title: "Sitting Room" },
    { src: "images/bed1.jpg", title: "Bedroom" }
];

let currentIndex = 0;

function openLightbox(index) {
    currentIndex = index;
    document.getElementById("lightbox").style.display = "flex";
    showImage();
}

function showImage() {
    document.getElementById("lightboxImage").src = images[currentIndex].src;
    document.getElementById("caption").innerText = images[currentIndex].title;
}

function closeLightbox() {
    document.getElementById("lightbox").style.display = "none";
}

function changeImage(step) {
    currentIndex += step;

    if (currentIndex < 0) {
        currentIndex = images.length - 1;
    }

    if (currentIndex >= images.length) {
        currentIndex = 0;
    }

    showImage();
}
    </script>
